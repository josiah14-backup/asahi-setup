# Solarized Dark for fuzzel.
#
# fuzzel's own *defaults* are already Solarized Light (background=fdf6e3
# = base3, border=002b36 = base03, match=cb4b16 = Solarized's orange
# accent -- confirmed via `man fuzzel.ini`). Converting to Solarized Dark
# is exactly Solarized's own documented light/dark role swap
# (base3<->base03, base2<->base02, base1<->base01, base0<->base00) --
# the accent colors (orange, etc.) don't change between variants, only
# which shade plays "background" vs "text".

[colors]
background=002b36ff
text=839496ff
message=839496ff
prompt=93a1a1ff
placeholder=586e75ff
input=839496ff
match=cb4b16ff
selection=073642ff
selection-text=93a1a1ff
selection-match=cb4b16ff
counter=586e75ff
border=fdf6e3ff

[border]
# Shrunk a couple more notches (was width=2/radius=6, then 1/4) to match
# the same "everything a bit smaller" pass applied to hyprland.conf's
# gaps/border. width stays at 1 -- fuzzel's practical minimum for a
# still-visible border, going to 0 would remove it entirely.
width=1
radius=2
