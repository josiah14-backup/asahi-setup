# Solarized Dark for hyprlock, using this repo's canonical palette (see
# project theming notes: base03 002b36 bg, base02 073642 bg-highlight,
# base01 586e75 muted, base0 839496 body text, orange cb4b16 accent --
# same values used throughout hypr/hyprland.conf, waybar, fuzzel).
#
# Added to close a real, previously-documented gap: this session had no
# lock daemon at all (hyprland.conf used to say so explicitly in its
# "Deliberately NOT carried over from xmonad.hs" comment block) --
# `loginctl lock-session` existed as a command but nothing was listening
# for the Lock signal, so it was a silent no-op. hyprlock is the
# standard pick for this gap (same maintainer/ecosystem as Hyprland
# itself).

general {
    hide_cursor = false
    grace = 0
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(002b36ff)
    blur_passes = 0
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(cb4b16ff)
    inner_color = rgba(073642ff)
    font_color = rgba(839496ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##586e75">Password...</span>
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(839496ff)
    font_size = 72
    font_family = Hack
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(93a1a1ff)
    font_size = 20
    font_family = Hack
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(cb4b16ff)
    font_size = 18
    font_family = Hack
    position = 0, -110
    halign = center
    valign = center
}
