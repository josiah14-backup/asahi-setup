# Idle-timeout companion to hyprlock.conf (see its own header comment
# for why this exists at all). Timeouts are a reasonable starting point,
# not a specific request -- adjust freely.
#
# before_sleep_cmd calls hyprlock directly rather than routing through
# `loginctl lock-session`: hyprlock doesn't listen for logind's Lock
# signal on its own, so `loginctl lock-session` alone would be a silent
# no-op here, same gap this whole file exists to close. Calling hyprlock
# directly means any suspend (manual `systemctl suspend`, lid-close, or
# the timeout-triggered one below) always locks first -- no path to
# waking up on an unlocked desktop.
#
# Deliberately NOT handling screen dim/off here (originally had a
# 330s dpms-off listener, removed): that's already PowerDevil's job via
# ~/.config/powerdevilrc's [AC|Battery][Display] timeouts, which are
# global (not Hyprland-specific) and predate this file -- letting both
# hypridle and PowerDevil independently manage DPMS caused a real,
# disruptive conflict (screen flashing while typing, brightness resets)
# when PowerDevil's own timeouts were briefly misconfigured. Rather than
# touch PowerDevil's global config again (risking the same effect on an
# actual Plasma session, where hypridle doesn't even run), this file now
# only owns lock + suspend -- the two things PowerDevil doesn't do here
# at all -- and leaves screen dim/off entirely to PowerDevil, exactly as
# it worked before any of this.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 900
    on-timeout = systemctl suspend
}
