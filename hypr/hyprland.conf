# Hyprland config for asahi-setup, mapped as closely as possible to
# josiah's actual xmonad.hs (pop-os-setup/.xmonad), not just xmonad's
# stock keybindings. See the comments throughout for what maps cleanly
# and what doesn't (Hyprland has no Xinerama-style global-workspace-swap
# behavior -- that gap is a known, accepted trade-off, not an oversight).
#
# Master layout dispatcher list (swapwithmaster, cyclenext/prev,
# swapnext/prev, addmaster/removemaster, mfact, orientation*) confirmed
# directly against Hyprland v0.49.0 source
# (src/layout/MasterLayout.cpp), matching the version this repo's
# solopasha/hyprland COPR install provides -- not just docs, which
# lag behind and are versioned per-release in a way that's easy to
# mismatch.

monitor=,preferred,auto,auto

exec-once = waybar

# Tells Qt/KDE apps (Dolphin, etc.) to ask qt6ct for their palette --
# there's no Plasma shell in this session to set one automatically the
# way there is under a real Plasma login, so without this they'd fall
# back to an unthemed default style instead of Solarized Dark.
env = QT_QPA_PLATFORMTHEME,qt6ct

input {
    kb_layout = us
    kb_variant = dvorak
    kb_options = caps:swapescape,ctrl:ralt_rctrl
    follow_mouse = 1
}

general {
    layout = master
    gaps_in = 2
    gaps_out = 4
    # Hyprland's real default (not the autogenerated stub's example
    # values) is border_size 1 with a plain white active border --
    # barely visible against a light theme. One pixel thicker, and
    # colored per Solarized Dark: orange (Solarized's own accent, same
    # one fuzzel/waybar use for emphasis) for the focused window,
    # base01 (muted blue-gray) for unfocused ones.
    border_size = 2
    col.active_border = rgba(cb4b16ff)
    col.inactive_border = rgba(586e75aa)
}

master {
    # mfact default (~0.55) left as-is; adjust at runtime with mod+h/mod+s below.
}

$mod = SUPER

# mod-shift-q: quit xmonad -> matches xmonad's stock (unoverridden) binding.
bind = $mod SHIFT, Q, exit

# mod-shift-Return: terminal, was `gnome-terminal -e 'tmux attach'` ->
# Konsole's equivalent of "run a command in a new window" is `-e`.
bind = $mod SHIFT, Return, exec, konsole -e tmux attach

# Deliberately NOT the xmonad.hs mapping, reworked twice now by request.
# h/j/k/l are vi-style spatial directions (h=left, j=down, k=up,
# l=right) for movefocus/movewindow -- distinct from master layout's own
# stack-order cyclenext/cycleprev (still on comma/period below), and
# distinct from mod-ctrl-h/j/k/l's group-merge directions elsewhere in
# this file, which use the same vi convention for a different action.
#
# mod-h/j/k/l: movefocus in that direction (spatial, based on actual
# on-screen window position -- not stack order). s duplicates l for
# right, matching this config's existing h/s/l duplication convention.
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, S, movefocus, r

# mod-shift-h/j/k/l: movewindow in that direction (move the focused
# window spatially, not to a different monitor -- see mod-shift-y/f
# below for that). Same s/l duplication for right.
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, S, movewindow, r

# mod-u / mod-d: Expand / Shrink (mfact), moved here since j/k above are
# now spatial focus movement. u/d were unbound, confirmed directly.
bind = $mod, U, layoutmsg, mfact +0.05
bind = $mod, D, layoutmsg, mfact -0.05

# mod-comma / mod-period: addmaster/removemaster (change the number of
# master windows) -- by request, replacing the stack-order
# cyclenext/cycleprev that used to live here (redundant with mod-h/j/k/l's
# spatial movefocus above, so no longer needed). Moved here from
# alt-comma/period below (bare Alt, xmonad.hs's own IncMasterN modifier),
# which is now unbound.
bind = $mod, comma, layoutmsg, removemaster
bind = $mod, period, layoutmsg, addmaster

# mod-shift-comma / mod-shift-period: windows W.swapDown / W.swapUp ->
# xmonad.hs binds these in addition to mod-shift-j/k (both did the same
# thing there), but mod-shift-j/k now means movewindow d/u (see above),
# so this stack-order swap only lives here now.
bind = $mod SHIFT, comma, layoutmsg, swapnext
bind = $mod SHIFT, period, layoutmsg, swapprev

# mod-t: "push window back into tiling" (sink) -> Hyprland has no
# one-directional "make tiled" dispatcher the way xmonad/vivarium do,
# only a toggle. togglefloating is the closest equivalent; if the
# window's already tiled this just does nothing useful, unlike
# xmonad's strictly-one-way sink.
bind = $mod, T, togglefloating

# mod-y / mod-f: prevScreen / nextScreen -> focusmonitor is the closest
# equivalent (cycle focus between monitors). This does NOT swap
# workspaces between monitors the way xmonad's Xinerama model did --
# that behavior isn't available in Hyprland natively, a known and
# accepted trade-off (see conversation history, not re-litigated here).
bind = $mod, Y, focusmonitor, -1
bind = $mod, F, focusmonitor, +1

# mod-shift-y / mod-shift-f: shiftPrevScreen / shiftNextScreen -> moves
# the focused window to the adjacent monitor. Same Xinerama-swap caveat
# as above applies -- this moves the window, it doesn't swap workspace
# assignments between the two monitors.
bind = $mod SHIFT, Y, movewindow, mon:-1
bind = $mod SHIFT, F, movewindow, mon:+1

# mod-e: spawn "nautilus" -> Plasma's file manager is Dolphin, not
# Nautilus (this is a Wayland-only alternate session on the same
# Fedora KDE Plasma image, so Dolphin's already installed).
bind = $mod, E, exec, dolphin

# mod-w: launch the default web browser -- resolved dynamically via
# `xdg-settings get default-web-browser` + `gtk-launch` rather than
# hardcoding a specific browser, so this keeps working if the default
# ever changes (confirmed current default: org.mozilla.firefox.desktop,
# which after this repo's earlier desktop-file disambiguation work is
# specifically the Flatpak Firefox, not the system one -- see
# writeDisambiguatedSystemDesktopFiles in Main.hs).
bind = $mod, W, exec, gtk-launch $(xdg-settings get default-web-browser)

# mod-shift-c: documented/stock xmonad "kill" binding (Close/kill the
# focused window, per xmonad.hs's own `help` text) -> killactive.
bind = $mod SHIFT, C, killactive

# mod-x: xmonad.hs's own second, actually-relied-on kill binding (added
# because its mod-shift-c got reassigned elsewhere by an unused tagging
# experiment in that config) -> also killactive, same as mod-shift-c.
bind = $mod, X, killactive

# mod-m: windows W.swapMaster -> swapwithmaster is the direct
# master-layout equivalent. Moved here (was mod-Return) by request, to
# free up mod-Return for cycle-master-orientation.sh below.
bind = $mod, M, layoutmsg, swapwithmaster

# mod-space: dmenu_run (xmonad's stock, unoverridden launcher binding,
# moved here from mod-p by request) -> fuzzel, a plain dnf package on
# this system (unlike tofi, which needed building from source) with
# nicer default rendering and no physical-keybindings-style gotcha -- it
# already honors the active keyboard layout/remaps for its own shortcuts
# out of the box. mod-p is deliberately left unbound now.
bind = $mod, space, exec, fuzzel

# mod-Return: cycle layout algorithms (stock xmonad binding, moved here
# from mod-space by request) -> Hyprland doesn't support runtime-cycling
# between dwindle/master the way xmonad/vivarium cycle layout
# algorithms; orientationcycle (cycling the master layout's own
# left/right/top/bottom/center orientations) is the closest available
# analog, not a true equivalent. Routed through
# cycle-master-orientation.sh rather than calling orientationcycle
# directly: Hyprland exposes no way to query the current orientation
# (getoption never updates after cycling, no IPC event fires, and even
# inferring it from window geometry is ambiguous -- "left" and "center"
# render identically with only 2 windows, confirmed directly) so the
# script tracks it in a state file for waybar's custom/layout module,
# and nudges waybar to refresh via a realtime signal. This assumes
# mod-Return stays the only thing that ever changes orientation --
# anything else changing it (a future keybind, a config reload, etc.)
# would desync the tracked value from Hyprland's actual state.
bind = $mod, Return, exec, ~/.config/hypr/scripts/cycle-master-orientation.sh

# Numbered workspaces, matching xmonad's stock mod+1-9 / mod+shift+1-9.
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Bare (no-modifier) media keys, matching xmonad.hs's own bare XF86 keys
# and commands exactly. bindl (not bind) since these should still work
# when locked, per Hyprland's own convention for media keys.
bindl = , XF86AudioMute, exec, pactl set-sink-mute 0 toggle
bindl = , XF86AudioLowerVolume, exec, amixer -q sset Master 3%-
bindl = , XF86AudioRaiseVolume, exec, amixer -q sset Master 3%+

# xmonad.hs used `xbacklight +10`/`-10` for these, but xbacklight is X11
# (XRandR) only and doesn't work under a native Wayland compositor.
# brightnessctl is the standard Wayland-compatible equivalent (already
# installed by this repo's Main.hs for the same reason).
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Window grouping/tabbing (multiple windows sharing one tile, switchable
# like tabs) -- fills a gap this repo originally listed as "no Hyprland
# equivalent" for xmonad.hs's pullGroup/MergeAll/UnMerge
# (XMonad.Layout.SubLayouts), which turned out to be wrong.
#
# mod-ctrl-h/s/l/j/k: moveintogroup in the vi-style direction (h=left,
# j=down, k=up, l=right; s duplicates l for right, matching this
# config's existing h/s/l convention elsewhere). moveintogroup's
# direction means "merge me into the group that's in that direction
# relative to my current position" (confirmed directly: focusing a
# window on the right and running `moveintogroup l` merged it into the
# window to its left).
bind = $mod CTRL, H, moveintogroup, l
bind = $mod CTRL, S, moveintogroup, r
bind = $mod CTRL, L, moveintogroup, r
bind = $mod CTRL, J, moveintogroup, d
bind = $mod CTRL, K, moveintogroup, u

# mod-g: togglegroup (start/stop a group on the focused window).
# mod-shift-g: moveoutofgroup (leave the group). mod-g was xmonad's
# GridSelect binding, unused here since GridSelect itself has no
# Hyprland equivalent -- reused for this instead by request.
bind = $mod, G, togglegroup
bind = $mod SHIFT, G, moveoutofgroup

# mod-Tab / mod-shift-Tab: changegroupactive (forward/backward) to cycle
# which window is showing in the active group, i.e. switch tabs. Needs
# its own bind since it's a distinct dispatcher from
# cyclenext/cycleprev, confirmed directly it doesn't fire as part of
# normal focus-cycling. Tab was unbound in xmonad.hs and here alike, so
# no xmonad mapping to preserve either way.
bind = $mod, Tab, changegroupactive
bind = $mod SHIFT, Tab, changegroupactive, b

# mod-b: ToggleStruts (gap reservation for docks/bars) -> this repo
# originally listed this as a gap with no Hyprland equivalent, which
# turned out to be wrong (same story as the group-merge gap above):
# Waybar's own SIGUSR1 signal defaults to toggling its visibility
# (show if hidden, hide if shown), confirmed via `man waybar`'s SIGNALS
# section -- no on-sigusr1 config override needed, that's the default.
bind = $mod, B, exec, killall -SIGUSR1 waybar

# Deliberately NOT carried over from xmonad.hs, with no reasonable
# Hyprland equivalent:
#   * mod-shift-m      restore next minimized window (no minimize concept)
#   * mod-shift-h/s    MirrorShrink/MirrorExpand (no separate mirror axis)
#   * (xmonad's) mod-m focusMaster (no "focus master without swapping" --
#                      mod-m here is now bound to swapwithmaster instead,
#                      see above; closest xmonad had was its own
#                      mod-Return, which also swaps)
#   * mod-c, mod-shift-c[tag-float variant], mod-shift-r, mod-ctrl-r, mod-r
#                      XMonad.Actions.TagWindows prompts (no tagging system)
#   * alt-shift-d/u    setxkbmap dvorak/us (no live keyboard-layout-switch
#                      keybind; would need a scripted wpctl/hyprctl approach)
#   * mod-BackSpace/Delete  REFLECTX/REFLECTY toggles (no reflection axis)
#   * mod-shift-l      screen lock (no lock daemon set up for this session)
