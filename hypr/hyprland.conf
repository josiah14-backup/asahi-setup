# Hyprland config for asahi-setup, mapped as closely as possible to
# josiah's actual xmonad.hs (pop-os-setup/.xmonad), not just xmonad's
# stock keybindings. See the comments throughout for what maps cleanly
# and what doesn't (Hyprland has no Xinerama-style global-workspace-swap
# behavior -- that gap is a known, accepted trade-off, not an oversight).
#
# Master layout dispatcher list (swapwithmaster, cyclenext/prev,
# swapnext/prev, addmaster/removemaster, mfact, orientation*) confirmed
# directly against Hyprland v0.49.0 source
# (src/layout/MasterLayout.cpp), matching the version this repo's
# solopasha/hyprland COPR install provides -- not just docs, which
# lag behind and are versioned per-release in a way that's easy to
# mismatch.

monitor=,preferred,auto,auto

exec-once = waybar

input {
    kb_layout = us
    kb_variant = dvorak
    kb_options = caps:swapescape,ctrl:ralt_rctrl
    follow_mouse = 1
}

general {
    layout = master
    gaps_in = 2
    gaps_out = 4
}

master {
    # mfact default (~0.55) left as-is; adjust at runtime with mod+h/mod+s below.
}

$mod = SUPER

# mod-shift-q: quit xmonad -> matches xmonad's stock (unoverridden) binding.
bind = $mod SHIFT, Q, exit

# mod-shift-Return: terminal, was `gnome-terminal -e 'tmux attach'` ->
# Konsole's equivalent of "run a command in a new window" is `-e`.
bind = $mod SHIFT, Return, exec, konsole -e tmux attach

# mod-h: Shrink -> matches directly, same key.
bind = $mod, H, layoutmsg, mfact -0.05

# mod-s / mod-l: Expand -> xmonad.hs's additionalKeys only adds/overrides
# the specific bindings it lists (no removeKeys call anywhere in that
# file), so mod-l never stopped being XMonad.defaultConfig's own stock
# Expand binding -- xmonad.hs's `((myModMask, xK_s), sendMessage Expand)`
# is a second, additional binding for the same action, not a replacement.
# Both keys are carried over here to match that.
bind = $mod, S, layoutmsg, mfact +0.05
bind = $mod, L, layoutmsg, mfact +0.05

# mod-comma / mod-period: focusDown / focusUp (XMonad.Actions.CycleWS,
# distinct from mod-j/k below but functionally the same "cycle focus"
# result in xmonad.hs) -> master layout's own cyclenext/cycleprev
# operate on stack order (master/slave list position), the same
# semantic xmonad's focus cycling uses -- a better match than a
# generic spatial movefocus would be.
bind = $mod, comma, layoutmsg, cyclenext
bind = $mod, period, layoutmsg, cycleprev

# mod-shift-comma / mod-shift-period: windows W.swapDown / W.swapUp ->
# xmonad.hs binds these in addition to mod-shift-j/k below (both do the
# same thing there), so both are carried over here too.
bind = $mod SHIFT, comma, layoutmsg, swapnext
bind = $mod SHIFT, period, layoutmsg, swapprev

# mod-j / mod-k: next/prev window -> matches directly, same keys, same
# stack-order cyclenext/cycleprev as comma/period above.
bind = $mod, J, layoutmsg, cyclenext
bind = $mod, K, layoutmsg, cycleprev

# mod-shift-j / mod-shift-k: swapDown / swapUp -> matches directly.
bind = $mod SHIFT, J, layoutmsg, swapnext
bind = $mod SHIFT, K, layoutmsg, swapprev

# mod-t: "push window back into tiling" (sink) -> Hyprland has no
# one-directional "make tiled" dispatcher the way xmonad/vivarium do,
# only a toggle. togglefloating is the closest equivalent; if the
# window's already tiled this just does nothing useful, unlike
# xmonad's strictly-one-way sink.
bind = $mod, T, togglefloating

# mod-y / mod-f: prevScreen / nextScreen -> focusmonitor is the closest
# equivalent (cycle focus between monitors). This does NOT swap
# workspaces between monitors the way xmonad's Xinerama model did --
# that behavior isn't available in Hyprland natively, a known and
# accepted trade-off (see conversation history, not re-litigated here).
bind = $mod, Y, focusmonitor, -1
bind = $mod, F, focusmonitor, +1

# mod-shift-y / mod-shift-f: shiftPrevScreen / shiftNextScreen -> moves
# the focused window to the adjacent monitor. Same Xinerama-swap caveat
# as above applies -- this moves the window, it doesn't swap workspace
# assignments between the two monitors.
bind = $mod SHIFT, Y, movewindow, mon:-1
bind = $mod SHIFT, F, movewindow, mon:+1

# mod-e: spawn "nautilus" -> Plasma's file manager is Dolphin, not
# Nautilus (this is a Wayland-only alternate session on the same
# Fedora KDE Plasma image, so Dolphin's already installed).
bind = $mod, E, exec, dolphin

# mod-shift-c: documented/stock xmonad "kill" binding (Close/kill the
# focused window, per xmonad.hs's own `help` text) -> killactive.
bind = $mod SHIFT, C, killactive

# mod-x: xmonad.hs's own second, actually-relied-on kill binding (added
# because its mod-shift-c got reassigned elsewhere by an unused tagging
# experiment in that config) -> also killactive, same as mod-shift-c.
bind = $mod, X, killactive

# mod-Return: windows W.swapMaster -> swapwithmaster is the direct
# master-layout equivalent.
bind = $mod, Return, layoutmsg, swapwithmaster

# alt+period / alt+comma: bare-Alt IncMasterN (distinct from the
# Super-modifier scheme above, matching xmonad.hs's own use of a
# different modifier for this one action) -> addmaster/removemaster is
# the master-layout equivalent of "change the number of master windows".
bind = ALT, period, layoutmsg, addmaster
bind = ALT, comma, layoutmsg, removemaster

# mod-space: cycle layout algorithms (stock xmonad binding) -> Hyprland
# doesn't support runtime-cycling between dwindle/master the way
# xmonad/vivarium cycle layout algorithms; orientationcycle (cycling the
# master layout's own left/right/top/bottom/center orientations) is the
# closest available analog, not a true equivalent.
bind = $mod, space, layoutmsg, orientationcycle

# mod-p: dmenu_run (xmonad's stock, unoverridden launcher binding) ->
# tofi-drun, per this repo's earlier request for tofi as the launcher.
bind = $mod, P, exec, tofi-drun --drun-launch=true

# Numbered workspaces, matching xmonad's stock mod+1-9 / mod+shift+1-9.
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Bare (no-modifier) media keys, matching xmonad.hs's own bare XF86 keys
# and commands exactly. bindl (not bind) since these should still work
# when locked, per Hyprland's own convention for media keys.
bindl = , XF86AudioMute, exec, pactl set-sink-mute 0 toggle
bindl = , XF86AudioLowerVolume, exec, amixer -q sset Master 3%-
bindl = , XF86AudioRaiseVolume, exec, amixer -q sset Master 3%+

# xmonad.hs used `xbacklight +10`/`-10` for these, but xbacklight is X11
# (XRandR) only and doesn't work under a native Wayland compositor.
# brightnessctl is the standard Wayland-compatible equivalent (already
# installed by this repo's Main.hs for the same reason).
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Deliberately NOT carried over from xmonad.hs, with no reasonable
# Hyprland equivalent:
#   * mod-g            GridSelect window picker
#   * mod-shift-m      restore next minimized window (no minimize concept)
#   * mod-ctrl-h/s/n/t pullGroup sub-tabbing (no sub-layout groups)
#   * mod-b            ToggleStruts (gap reservation isn't toggleable here)
#   * mod-shift-h/s    MirrorShrink/MirrorExpand (no separate mirror axis)
#   * mod-m            focusMaster (no "focus master without swapping";
#                      closest is mod-Return, which also swaps)
#   * mod-c, mod-shift-c[tag-float variant], mod-shift-r, mod-ctrl-r, mod-r
#                      XMonad.Actions.TagWindows prompts (no tagging system)
#   * alt-shift-d/u    setxkbmap dvorak/us (no live keyboard-layout-switch
#                      keybind; would need a scripted wpctl/hyprctl approach)
#   * mod-BackSpace/Delete  REFLECTX/REFLECTY toggles (no reflection axis)
#   * mod-shift-l      screen lock (no lock daemon set up for this session)
