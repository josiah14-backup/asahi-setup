[font]
# Hack Nerd Font, not plain Hack: LazyVim's UI (lualine, neo-tree,
# bufferline, which-key) renders icon glyphs that only exist in the
# Nerd Font-patched version. Briefly suspected of causing a
# "malloc(): mismatching next->prev_size (unsorted)" crash on opening
# app/Main.hs -- ruled out directly: bare headless `nvim` (no GUI, no
# font rendering at all) crashed on the exact same file with the exact
# same error, so it was never about the font. Real cause: the Haskell
# nvim-treesitter parser itself has a memory-corruption bug on this
# file (see lang-basic.lua's own comment for the isolation steps).
normal = ["Hack Nerd Font"]
size = 11.0
