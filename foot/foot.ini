# Solarized Dark for foot, using the same standard 16-ANSI-color
# Solarized mapping as konsole/SolarizedDark.colorscheme (normal 0-7 =
# base02/red/green/yellow/blue/magenta/cyan/base1; bright 0-7 =
# base03/orange/base01/base00/base0/violet/base1/base3), confirmed via
# `man foot.ini`'s SECTION: colors-dark, colors-light. Note foot's own
# *default* foreground/background (839496/002b36) already happen to be
# Solarized's base0/base03 -- only the regular*/bright* ANSI colors
# (foot's stock "starlight" palette) actually needed overriding.

# Original size=10 (after reverting an earlier shrink pass -- see git
# history) still read a bit small at 1.5x monitor scale, bumped to 11.
font=Hack:size=11

[colors-dark]
foreground=839496
background=002b36
regular0=073642
regular1=dc322f
regular2=859900
regular3=b58900
regular4=268bd2
regular5=d33682
regular6=2aa198
regular7=93a1a1
bright0=002b36
bright1=cb4b16
bright2=586e75
bright3=657b83
bright4=839496
bright5=6c71c4
bright6=93a1a1
bright7=fdf6e3
